<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Energy Clicker</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            user-select: none;
        }

        .container {
            text-align: center;
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        #energy-core {
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #38bdf8 0%, #0369a1 100%);
            border-radius: 50%;
            margin: 2rem auto;
            cursor: pointer;
            box-shadow: 0 0 20px #0ea5e9;
            transition: transform 0.05s ease;
        }

        #energy-core:active {
            transform: scale(0.92);
            box-shadow: 0 0 35px #38bdf8;
        }

        .score-display {
            font-size: 2rem;
            font-weight: bold;
            color: #38bdf8;
            margin-bottom: 0.5rem;
        }

        .stats {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }

        .upgrade-btn {
            background-color: #334155;
            color: #f8fafc;
            border: 2px solid #475569;
            padding: 0.75rem 1rem;
            margin: 0.5rem 0;
            border-radius: 0.5rem;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            transition: all 0.2s ease;
        }

        .upgrade-btn:hover:not(:disabled) {
            background-color: #475569;
            border-color: #38bdf8;
        }

        .upgrade-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="score-display"><span id="energy-count">0</span> J</div>
        <div class="stats">Generation: <span id="eps-count">0</span> J/s</div>
        
        <div id="energy-core"></div>
        
        <button class="upgrade-btn" id="upg-click" disabled>
            <span>Plasma Induction (+1/click)</span>
            <span id="cost-click">15 J</span>
        </button>
        
        <button class="upgrade-btn" id="upg-auto" disabled>
            <span>Solar Array (+1 J/s)</span>
            <span id="cost-auto">50 J</span>
        </button>
    </div>

    <script>
        // Game State Variables
        let energy = 0;
        let clickPower = 1;
        let autoPower = 0;

        let costClick = 15;
        let costAuto = 50;

        // DOM Elements
        const energyDisplay = document.getElementById('energy-count');
        const epsDisplay = document.getElementById('eps-count');
        const coreBtn = document.getElementById('energy-core');
        const upgClickBtn = document.getElementById('upg-click');
        const upgAutoBtn = document.getElementById('upg-auto');
        const costClickDisplay = document.getElementById('cost-click');
        const costAutoDisplay = document.getElementById('cost-auto');

        // Core Game Logic Loop
        function updateUI() {
            energyDisplay.textContent = Math.floor(energy);
            epsDisplay.textContent = autoPower;
            costClickDisplay.textContent = costClick + " J";
            costAutoDisplay.textContent = costAuto + " J";

            // Enable or disable upgrade buttons based on balance
            upgClickBtn.disabled = energy < costClick;
            upgAutoBtn.disabled = energy < costAuto;
        }

        // Manual Click Interaction
        coreBtn.addEventListener('click', () => {
            energy += clickPower;
            updateUI();
        });

        // Purchase Upgrades
        upgClickBtn.addEventListener('click', () => {
            if (energy >= costClick) {
                energy -= costClick;
                clickPower += 1;
                costClick = Math.round(costClick * 1.15); // Scale price by 15%
                updateUI();
            }
        });

        upgAutoBtn.addEventListener('click', () => {
            if (energy >= costAuto) {
                energy -= costAuto;
                autoPower += 1;
                costAuto = Math.round(costAuto * 1.15); // Scale price by 15%
                updateUI();
            }
        });

        // Background Automation loop (Runs every 100ms for smooth updating)
        setInterval(() => {
            if (autoPower > 0) {
                energy += (autoPower / 10);
                updateUI();
            }
        }, 100);

        // Initial render
        updateUI();
    </script>
</body>
</html>
